<h2 class="text-center" id="head"> Feel free to use our Contact Form to reach us</h2>
<br><br>
<form class="example-form" class = "text-center" >
  
      <mat-form-field class="example-full-width">
        <input matInput placeholder="Your Name">
      </mat-form-field>
 <br>
      <mat-form-field class="example-full-width" appearance="fill" style="background-color: white;">
        <mat-label>Email</mat-label>
        <input type="email" matInput [formControl]="emailFormControl" [errorStateMatcher]="matcher"
               placeholder="Ex. mwangaza@example.com">
        <mat-hint>Errors appear instantly!</mat-hint>
        <mat-error *ngIf="emailFormControl.hasError('email') && !emailFormControl.hasError('required')">
          Please enter a valid email address
        </mat-error>
        <mat-error *ngIf="emailFormControl.hasError('required')">
          Email is <strong>required</strong>
        </mat-error>
      </mat-form-field>
<br>
      <mat-form-field class="example-full-width" >
        <input matInput placeholder="Subject" matInput type="text">
        
      </mat-form-field>
<br>
      <mat-form-field class="example-full-width" >
        <input matInput placeholder="Message To Mwangaza " matInput type="text">
      </mat-form-field>

     

    <br>

    <button mat-stroked-button color="accent" class="btn-block">Send Message</button>

  </form>

<br><br><br>
