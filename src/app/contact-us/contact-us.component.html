<ng-progress></ng-progress>
<h2 class="text-center" id="head"> Feel free to use our Contact Form to reach us</h2>
<br><br>
  <form class="example-form"  name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" class="text-center">
  
 
      <mat-form-field class="example-full-width">
        <input matInput placeholder="Your Name" name="name" [(ngModel)]="form.name" #name="ngModel" matInput type="text" >
      </mat-form-field>
 <br>
 <mat-form-field class="example-full-width" appearance="fill" style="background-color: white;">
  <mat-label>Email</mat-label>
  <input type="email" matInput [errorStateMatcher]="matcher"
         placeholder="Ex. mwangaza@example.com"  name="email" [(ngModel)]="form.email" required
         email #email="ngModel" >
  <mat-hint>Errors appear instantly!</mat-hint>
  <mat-error *ngIf="emailFormControl.hasError('email') && !emailFormControl.hasError('required')">
    Please enter a valid email address
  </mat-error>
  <mat-error *ngIf="emailFormControl.hasError('required')">
    Email is <strong>required</strong>
  </mat-error>
</mat-form-field>
<br>
<mat-form-field class="example-full-width">
  <input matInput placeholder="Subject" name="subject" [(ngModel)]="form.subject" #subject="ngModel" matInput type="text" >
</mat-form-field>
<br>
<mat-form-field class="example-full-width">
  <input matInput placeholder="Message to Mwangaza" name="message" [(ngModel)]="form.message" #message="ngModel" matInput type="text" >
</mat-form-field>

     

    <br>

    <button mat-stroked-button color="accent" class="btn-block" matInput type="submit">Send Message</button>

  </form>

<br><br><br>

    <app-footer></app-footer>
