
<div class="background">
  <br><br>
<div class="login-wrapper" fxLayout="row" fxLayoutAlign="center center">
  <mat-card class="box" >
      <mat-card-header>
        <img class="hel" src="../assets/photos/mwangaza.jpeg" alt="" width="100%">
        
        <mat-card-title>Register</mat-card-title>
      </mat-card-header>
  
      <form class="example-form" *ngIf="!isSuccessful" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm">
  
        <mat-card-content>
          <mat-form-field class="example-full-width">
            <input matInput placeholder="Username" name="username" [(ngModel)]="form.username" #username="ngModel">
          </mat-form-field>
  
          <mat-form-field class="example-full-width" appearance="fill" style="background-color: white;">
            <mat-label>Email</mat-label>
            <input type="email" matInput [formControl]="emailFormControl" [errorStateMatcher]="matcher"
                   placeholder="Ex. mwangaza@example.com"  name="email" [(ngModel)]="form.email" required
                   email  >
            <mat-hint>Errors appear instantly!</mat-hint>
            <mat-error *ngIf="emailFormControl.hasError('email') && !emailFormControl.hasError('required')">
              Please enter a valid email address
            </mat-error>
            <mat-error *ngIf="emailFormControl.hasError('required')">
              Email is <strong>required</strong>
            </mat-error>
          </mat-form-field>
  
          <mat-form-field class="example-full-width" >
            <input matInput placeholder="Phonenumber" matInput type="text"  minlength="13" maxlength="13" placeholder="phone" name="phone"
            [(ngModel)]="form.phone" required phone #phone="ngModel" >
            
          </mat-form-field>
          <mat-form-field class="example-full-width" >
            <input matInput placeholder="Password" matInput type="password" name="password" [(ngModel)]="form.password"
            required minlength="6" #password="ngModel">
            
          </mat-form-field>

          <mat-form-field class="example-full-width" >
            <input matInput placeholder="Confirm Password" matInput type="password">
          </mat-form-field>
  
          <!-- <mat-form-field class="example-full-width">
            <mat-label>Choose a role...</mat-label>
            <mat-select>
              <mat-option [value]="roles" *ngFor="let roles of Roles">{{roles}}
              </mat-option>
            </mat-select>
          </mat-form-field> -->
  
        </mat-card-content>
  
        <button class="btn btn-info my-4 btn-block" type="submit">Sign Up</button>
  
      </form>
      Already have an account? <a href="login">Login</a>
    </mat-card>
    <br><br><br>
  </div>
 
</div>
